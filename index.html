<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="style.css" />
        <script defer src="./index.js"></script>
        <title>Frontend Mentor | Tip calculator app</title>
    </head>
    <body>
        <header class="header">
            <img src="./assets/images/logo.svg" alt="" />
        </header>

        <main class="wrapper">
            <form novalidate class="tip-calculator">
                <div class="form-group">
                    <label for="bill-amount">Bill</label>
                    <span class="error"></span>
                    <input
                        type="text"
                        inputmode="numeric"
                        id="bill-amount"
                        name="bill-amount"
                        placeholder="0"
                    />
                </div>

                <fieldset>
                    <legend>Select Tip %</legend>
                    <div class="radio-group">
                        <input
                            type="radio"
                            name="tip-percentage"
                            id="5-percent"
                            value="5"
                        />
                        <label class="btn btn--tip" for="5-percent" tabindex="0"
                            >5%</label
                        >
                    </div>
                    <div class="radio-group">
                        <input
                            type="radio"
                            name="tip-percentage"
                            id="10-percent"
                            value="10"
                        />
                        <label
                            class="btn btn--tip"
                            for="10-percent"
                            tabindex="0"
                            >10%</label
                        >
                    </div>
                    <div class="radio-group">
                        <input
                            type="radio"
                            name="tip-percentage"
                            id="15-percent"
                            value="15"
                        />
                        <label
                            class="btn btn--tip"
                            for="15-percent"
                            tabindex="0"
                            >15%</label
                        >
                    </div>
                    <div class="radio-group">
                        <input
                            type="radio"
                            name="tip-percentage"
                            id="25-percent"
                            value="25"
                        />
                        <label
                            class="btn btn--tip"
                            for="25-percent"
                            tabindex="0"
                            >25%</label
                        >
                    </div>
                    <div class="radio-group">
                        <input
                            type="radio"
                            name="tip-percentage"
                            id="50-percent"
                            value="50"
                        />
                        <label
                            class="btn btn--tip"
                            for="50-percent"
                            tabindex="0"
                            >50%</label
                        >
                    </div>

                    <input
                        type="text"
                        inputmode="numeric"
                        name="tip-percentage"
                        id="custom-percent"
                        placeholder="Custom"
                    />
                </fieldset>

                <div class="form-group">
                    <label for="people-amount">Number of People</label>
                    <span class="error"></span>
                    <input
                        type="number"
                        id="people-amount"
                        name="people-amount"
                        min="1"
                        step="1"
                        placeholder="0"
                    />
                </div>
            </form>

            <div class="tip-result">
                <div class="results-wrapper">
                    <div class="flex-group">
                        <p>
                            Tip Amount<span class="d-block accent-text"
                                >/ person</span
                            >
                        </p>
                        <p id="result-tip">$0.00</p>
                    </div>
                    <div class="flex-group">
                        <p>
                            Total<span class="d-block accent-text"
                                >/ person</span
                            >
                        </p>
                        <p id="result-total">$0.00</p>
                    </div>
                </div>

                <button class="btn btn--reset" disabled>Reset</button>
            </div>
        </main>

  </div> -->
    </body>
</html>
